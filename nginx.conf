# =============================================================================
# AI Agent Assistant System — Nginx 反向代理配置
# =============================================================================
# 适用环境: Windows / Linux
# 后端 FastAPI :8000  |  前端 React SPA (生产: 静态文件 / 开发: Vite :5173)
# =============================================================================

# ---------- 全局 ----------
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream backend {
        server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    }

    # HTTP → HTTPS 强制跳转（生产环境启用）
    # server {
    #     listen       80;
    #     server_name  your_domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # HTTPS Server（生产环境）
    # server {
    #     listen       443 ssl http2;
    #     server_name  your_domain.com;
    #     ssl_certificate     /path/to/fullchain.pem;
    #     ssl_certificate_key /path/to/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     # ... 以下 location 与 HTTP server 共用
    # }

# =============================================================================
# HTTP Server（开发 / 内网环境）
# =============================================================================
server {
    listen       80;
    server_name  localhost 127.0.0.1;   # 实际部署时改为你的域名或 IP

    # -------------------- 字符集 --------------------
    charset utf-8;

    # -------------------- 日志 --------------------
    access_log  logs/ai-assistant-access.log;
    error_log   logs/ai-assistant-error.log;

    # -------------------- 上传大小限制 --------------------
    client_max_body_size 100M;           # 知识库上传文档，根据需要调整

    # ========================================================
    # 生产模式 —— 前端构建产物 (推荐)
    # 1. 在 frontend/ 目录执行: npm run build
    # 2. 产物输出到 frontend/dist/
    # ========================================================
    root   E:/Workspace/AI_Agent_Assistant_System/frontend/dist;
    index  index.html;

    # ----- SPA 路由 fallback（核心！必须放在 API proxy 之后）-----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================
    # 开发模式 —— 代理到 Vite 开发服务器
    # 使用前请取消注释，并注释掉上面的 root + location / 块
    # ========================================================
    # location / {
    #     proxy_pass http://127.0.0.1:5173;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ========================================================
    # API 反向代理 → FastAPI :8000
    # ========================================================
    location /api/ {
        proxy_pass http://backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（SSE 流式场景需要较长超时）
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout      300s;

        # ----- SSE (Server-Sent Events) 关键配置 -----
        # /api/chat/stream 是 SSE 端点，禁止 proxy 缓冲
        proxy_buffering         off;
        proxy_cache             off;

        # 清除 CORS 头（由后端统一控制）
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ========================================================
    # 后端其他非 /api 路径（健康检查等）
    # ========================================================
    location ~ ^/(health|db-test)$ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================
    # 静态文件 —— 用户上传资源（可选）
    # 若后端返回的 URL 指向 /uploads/，则由 nginx 直接提供
    # ========================================================
    location /uploads/ {
        alias E:/Workspace/AI_Agent_Assistant_System/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================
    # 安全头
    # ========================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# =============================================================================
# 参考命令
# =============================================================================
# Windows:
#   启动:   nginx.exe
#   重载:   nginx.exe -s reload
#   停止:   nginx.exe -s quit
#   检查:   nginx.exe -t -c conf/nginx.conf
#
# Linux:
#   启动:   sudo systemctl start nginx
#   重载:   sudo nginx -s reload
#   检查:   sudo nginx -t
}
