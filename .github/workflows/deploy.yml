name: 自动部署

# ───── 触发条件 ─────
on:
  push:
    branches: [master]   # 只有推送到 master 分支时触发

# ───── 环境变量 ─────
env:
  SERVER_PATH: /home/ubuntu/AI-Agent-Assistant-System  # 服务器上项目目录

# ───── 任务 ─────
jobs:
  deploy:
    name: 部署到云服务器
    runs-on: ubuntu-latest
    # 超时 10 分钟，防止卡死
    timeout-minutes: 10

    steps:
      - name: 🔍 检出代码
        uses: actions/checkout@v4

      - name: 🚀 SSH 登录并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "🔄 进入项目目录..."
            cd ${{ env.SERVER_PATH }}

            echo "🔄 拉取最新代码..."
            git pull

            echo "🔄 重新构建并启动容器..."
            docker compose up -d --build

            echo "✅ 部署完成！验证服务..."
            sleep 3
            curl -sf http://localhost/health && echo "  → 健康检查通过" || echo "  → 健康检查失败，请查看日志"
